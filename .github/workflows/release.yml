name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        shell: pwsh
        run: ./packaging/Build-Release.ps1 -Version ($env:GITHUB_REF_NAME).TrimStart('v')

      - name: Build MSI
        shell: pwsh
        run: ./packaging/Build-Msi.ps1 -Version ($env:GITHUB_REF_NAME).TrimStart('v')

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.msi
